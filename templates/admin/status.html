{% extends "admin/base_site.html" %}
{% load static %}

{% block extrahead %}
{{ block.super }}
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
    .dashboard-container {
        padding: 20px;
        display: flex;
        flex-wrap: wrap;
        gap: 30px;
        justify-content: center;
    }
    .chart-card {
        background: #fff;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        padding: 20px;
        flex: 1;
        min-width: 400px;
        max-width: 600px;
    }
    .chart-card h2 {
        margin-top: 0;
        color: #333;
        border-bottom: 2px solid #f4f4f4;
        padding-bottom: 10px;
        margin-bottom: 20px;
    }
    canvas {
        max-height: 400px;
    }
</style>
{% endblock %}

{% block content %}
<div class="dashboard-container">
    <div class="chart-card">
        <h2>Most Sold Items by Category</h2>
        <canvas id="categoryChart"></canvas>
    </div>

    <div class="chart-card">
        <h2>Most Used Rooms</h2>
        <canvas id="roomChart"></canvas>
    </div>
</div>

<script>
    // Category Chart (Pie Chart)
    const categoryCtx = document.getElementById('categoryChart').getContext('2d');
    new Chart(categoryCtx, {
        type: 'pie',
        data: {
            labels: {{ category_labels|safe }},
            datasets: [{
                label: 'Total Sold',
                data: {{ category_data|safe }},
                backgroundColor: [
                    '#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', '#9966FF', '#FF9F40'
                ],
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { position: 'bottom' }
            }
        }
    });

    // Room Utilization Chart (Bar Chart)
    const roomCtx = document.getElementById('roomChart').getContext('2d');
    new Chart(roomCtx, {
        type: 'bar',
        data: {
            labels: {{ room_labels|safe }},
            datasets: [{
                label: 'Total Bookings',
                data: {{ room_data|safe }},
                backgroundColor: '#36A2EB',
                borderColor: '#2980b9',
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            scales: {
                y: { beginAtZero: true }
            },
            plugins: {
                legend: { display: false }
            }
        }
    });
</script>
{% endblock %}
